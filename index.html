<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Savvi" />
<meta name="theme-color" content="#311E10" />
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="manifest" href="./manifest.webmanifest" />
<title>Savvi Open Home</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700;6..72,800&display=swap');
  @font-face{font-family:'Neue Haas Unica Pro';src:url('/fonts/NeueHaasUnicaPro-Light.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap;}
  @font-face{font-family:'Neue Haas Unica Pro';src:url('/fonts/NeueHaasUnicaPro-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'Neue Haas Unica Pro';src:url('/fonts/NeueHaasUnicaPro-Italic.woff2') format('woff2');font-weight:400;font-style:italic;font-display:swap;}
  @font-face{font-family:'Neue Haas Unica Pro';src:url('/fonts/NeueHaasUnicaPro-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}
  @font-face{font-family:'Neue Haas Unica Pro';src:url('/fonts/NeueHaasUnicaPro-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #311E10; overscroll-behavior: none; }
  /* Lock the page so only the app's own panes scroll — no whole-page bounce on iOS. */
  body { overflow: hidden; position: fixed; inset: 0; width: 100%; }
  /* Pin the app to the *dynamic* viewport (dvh) so it doesn't jump as Safari's
     toolbar hides/shows, and centre it as a phone-width frame on any device. */
  #root { height: 100vh; height: 100dvh; max-width: 460px; margin: 0 auto; background: #F4F0E8; overflow: hidden; position: relative; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
